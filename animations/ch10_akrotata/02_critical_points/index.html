<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Τοπικά Ακρότατα</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;background:#f5f7fa}header{background:linear-gradient(135deg,#004080,#0060a0);color:#fff;padding:1.2rem 1.5rem;border-bottom:3px solid #c85000}.container{max-width:950px;margin:0 auto;padding:1.5rem 1rem}canvas{border:2px solid #dde3ea;border-radius:10px;display:block;margin:1.5rem auto}.info-box{background:#e8f4f8;border-left:4px solid #004080;padding:.7rem 1rem;margin-bottom:1rem}.author-stamp{background:linear-gradient(135deg,#004080,#003060);color:#fff;padding:.8rem 1.4rem;font-size:.82rem;border-top:3px solid #c85000;margin-top:2rem}</style></head><body><header><h1>Τοπικά Ακρότατα</h1><p>Κεφάλαιο 10</p></header><div class="container"><div class="info-box"><strong>Εκπαιδευτικός Στόχος:</strong> Βρίσκουμε ακρότατα από f'=0, μετά χρησιμοποιούμε δεύτερη παράγωγο (f''>0 min, f''<0 max) ή πρώτη παράγωγο (αλλαγή προσήμου).</div><canvas id="canvas" width="700" height="500"></canvas></div><div class="author-stamp"><span class="stamp-book">📖 Συμπληρωματικό υλικό από το βιβλίο <em>«Μαθηματικά Ι»</em></span><span>Νίκος Ματζάκος, Αναπλ. Καθηγητής · Παιδαγωγικό Τμήμα, ΑΣΠΑΙΤΕ</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');function f(x){return x*x*x-3*x+1;}function f_prime(x){return 3*x*x-3;}function f_double_prime(x){return 6*x;}function updateDisplay(){ctx.clearRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;const sx=canvas.width*0.7/5;const sy=canvas.height*0.7/8;ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,canvas.height*0.1);ctx.lineTo(cx,canvas.height*0.9);ctx.stroke();ctx.beginPath();ctx.moveTo(canvas.width*0.15,cy);ctx.lineTo(canvas.width*0.85,cy);ctx.stroke();ctx.strokeStyle='#c85000';ctx.lineWidth=2.5;ctx.beginPath();for(let x=-2.5;x<=2.5;x+=0.05){const px=cx+x*sx;const py=cy-f(x)*sy;if(x===-2.5)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();const critPoints=[-1,1];for(let cp of critPoints){const px=cx+cp*sx;const py=cy-f(cp)*sy;const fpp=f_double_prime(cp);if(fpp>0){ctx.fillStyle='#008c46';ctx.beginPath();ctx.arc(px,py,6,0,2*Math.PI);ctx.fill();}else{ctx.fillStyle='#d32f2f';ctx.beginPath();ctx.arc(px,py,6,0,2*Math.PI);ctx.fill();}}}updateDisplay();</script></body></html>
