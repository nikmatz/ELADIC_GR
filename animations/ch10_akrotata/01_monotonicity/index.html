<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Μονοτονία</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;background:#f5f7fa}header{background:linear-gradient(135deg,#004080,#0060a0);color:#fff;padding:1.2rem 1.5rem;border-bottom:3px solid #c85000}header h1{font-size:1.3rem}.container{max-width:950px;margin:0 auto;padding:1.5rem 1rem}canvas{border:2px solid #dde3ea;border-radius:10px;display:block;margin:1.5rem auto}.btn{background:#004080;color:#fff;border:none;padding:.5rem 1.2rem;border-radius:6px;cursor:pointer;font-size:.88rem;margin:.2rem}.btn.orange{background:#c85000}.control-group{background:#fff;padding:1rem;border-radius:8px;margin-bottom:1rem;border:1px solid #dde3ea}input[type=range]{width:100%;accent-color:#c85000}.info-box{background:#e8f4f8;border-left:4px solid #004080;padding:.7rem 1rem}.author-stamp{background:linear-gradient(135deg,#004080,#003060);color:#fff;padding:.8rem 1.4rem;font-size:.82rem;border-top:3px solid #c85000;margin-top:2rem}.stamp-book{color:#ffd080;font-weight:bold}</style></head><body><header><h1>Μονοτονία και Παράγωγος</h1><p>Κεφάλαιο 10: Ακρότατα</p></header><div class="container"><div class="info-box"><strong>Εκπαιδευτικός Στόχος:</strong> f'(x)>0 ⟹ αύξουσα, f'(x)<0 ⟹ φθίνουσα. Τα κρίσιμα σημεία (f'=0) είναι υποψήφια για ακρότατα.</div><div class="control-group"><label>Παράμετρος c: <span id="c-val">0</span></label><input type="range" id="c" min="-5" max="5" step="0.5" value="0"></div><canvas id="canvas" width="700" height="500"></canvas></div><div class="author-stamp"><span class="stamp-book">📖 Συμπληρωματικό υλικό από το βιβλίο <em>«Μαθηματικά Ι»</em></span><span>Νίκος Ματζάκος, Αναπλ. Καθηγητής &nbsp;·&nbsp; Παιδαγωγικό Τμήμα, ΑΣΠΑΙΤΕ</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');let c=0;document.getElementById('c').addEventListener('input',(e)=>{c=parseFloat(e.target.value);document.getElementById('c-val').textContent=c.toFixed(1);updateDisplay();});function f(x){return x*x*x-3*x+c;}function f_prime(x){return 3*x*x-3;}function updateDisplay(){ctx.clearRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;const sx=canvas.width*0.7/5;const sy=canvas.height*0.7/8;ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,canvas.height*0.1);ctx.lineTo(cx,canvas.height*0.9);ctx.stroke();ctx.beginPath();ctx.moveTo(canvas.width*0.15,cy);ctx.lineTo(canvas.width*0.85,cy);ctx.stroke();for(let x=-2.5;x<=2.5;x+=0.1){const y=f(x);const fp=f_prime(x);const px=cx+x*sx;const py=cy-y*sy;const color=fp>0.1?'#008c46':fp<-0.1?'#d32f2f':'#999';ctx.fillStyle=color;ctx.fillRect(px-1,py-1,2,2);}ctx.strokeStyle='#c85000';ctx.lineWidth=2.5;ctx.beginPath();for(let x=-2.5;x<=2.5;x+=0.05){const px=cx+x*sx;const py=cy-f(x)*sy;if(x===-2.5)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}updateDisplay();</script></body></html>
