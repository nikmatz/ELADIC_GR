<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Κανόνας L'Hôpital</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;background:#f5f7fa}header{background:linear-gradient(135deg,#004080,#0060a0);color:#fff;padding:1.2rem 1.5rem;border-bottom:3px solid #c85000}.container{max-width:950px;margin:0 auto;padding:1.5rem 1rem}canvas{border:2px solid #dde3ea;border-radius:10px;display:block;margin:1.5rem auto}.btn{background:#004080;color:#fff;border:none;padding:.5rem 1.2rem;border-radius:6px;cursor:pointer;margin:.2rem}.control-group{background:#fff;padding:1rem;border-radius:8px;margin-bottom:1rem}.info-box{background:#e8f4f8;border-left:4px solid #004080;padding:.7rem 1rem}.author-stamp{background:linear-gradient(135deg,#004080,#003060);color:#fff;padding:.8rem 1.4rem;font-size:.82rem;border-top:3px solid #c85000;margin-top:2rem}</style></head><body><header><h1>Κανόνας L'Hôpital</h1><p>Κεφάλαιο 11: Απροσδιόριστες μορφές</p></header><div class="container"><div class="info-box"><strong>Εκπαιδευτικός Στόχος:</strong> Αν lim f/g είναι 0/0 ή ∞/∞, τότε lim f/g = lim f'/g'</div><div class="control-group"><button class="btn" id="ex1">sin(x)/x, x→0</button><button class="btn" id="ex2">(eˣ-1)/x, x→0</button><button class="btn" id="ex3">(x²-1)/(x-1), x→1</button></div><canvas id="canvas" width="700" height="450"></canvas><div class="info-box" id="result"></div></div><div class="author-stamp"><span class="stamp-book">📖 Συμπληρωματικό υλικό από το βιβλίο <em>«Μαθηματικά Ι»</em></span><span>Νίκος Ματζάκος, Αναπλ. Καθηγητής · Παιδαγωγικό Τμήμα, ΑΣΠΑΙΤΕ</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');let ex=0;const examples=[{num:x=>Math.sin(x),den:x=>x,num_prime:x=>Math.cos(x),den_prime:x=>1,pt:0.0001,name:'sin(x)/x'},{num:x=>Math.exp(x)-1,den:x=>x,num_prime:x=>Math.exp(x),den_prime:x=>1,pt:0.0001,name:'(eˣ-1)/x'},{num:x=>x*x-1,den:x=>x-1,num_prime:x=>2*x,den_prime:x=>1,pt:1,name:'(x²-1)/(x-1)'}];function setEx(i){ex=i;updateDisplay();}document.getElementById('ex1').addEventListener('click',()=>setEx(0));document.getElementById('ex2').addEventListener('click',()=>setEx(1));document.getElementById('ex3').addEventListener('click',()=>setEx(2));function updateDisplay(){ctx.clearRect(0,0,canvas.width,canvas.height);const example=examples[ex];const cx=canvas.width/2;const cy=canvas.height/2;const sx=canvas.width*0.7/6;const sy=canvas.height*0.7/3;ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,canvas.height*0.15);ctx.lineTo(cx,canvas.height*0.85);ctx.stroke();ctx.beginPath();ctx.moveTo(canvas.width*0.15,cy);ctx.lineTo(canvas.width*0.85,cy);ctx.stroke();ctx.strokeStyle='#c85000';ctx.lineWidth=2.5;ctx.beginPath();for(let x=-3;x<=3;x+=0.05){const px=cx+x*sx;const py=cy-(example.num(x)/example.den(x))*sy;if(x===-3)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();ctx.strokeStyle='#008c46';ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.beginPath();for(let x=-3;x<=3;x+=0.05){const px=cx+x*sx;const py=cy-(example.num_prime(x)/example.den_prime(x))*sy;if(x===-3)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();ctx.setLineDash([]);const limit=example.num_prime(example.pt)/example.den_prime(example.pt);document.getElementById('result').innerHTML=`<strong>${example.name}:</strong><br>lim = ${limit.toFixed(3)} (L'Hôpital)`;}updateDisplay();</script></body></html>
