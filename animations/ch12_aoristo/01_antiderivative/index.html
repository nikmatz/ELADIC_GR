<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Αντιπαράγωγος</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Georgia,serif;background:#f5f7fa}header{background:linear-gradient(135deg,#004080,#0060a0);color:#fff;padding:1.2rem 1.5rem;border-bottom:3px solid #c85000}header h1{font-size:1.3rem}.container{max-width:950px;margin:0 auto;padding:1.5rem}canvas{border:2px solid #dde3ea;border-radius:10px;display:block;margin:1.5rem auto}.btn{background:#004080;color:#fff;border:none;padding:.5rem 1.2rem;border-radius:6px;cursor:pointer;margin:.2rem}.control-group{background:#fff;padding:1rem;border-radius:8px;margin-bottom:1rem}input[type=range]{width:100%;accent-color:#c85000}.author-stamp{background:linear-gradient(135deg,#004080,#003060);color:#fff;padding:.8rem 1.4rem;font-size:.82rem;border-top:3px solid #c85000;margin-top:2rem}</style></head><body><header><h1>Αντιπαράγωγος</h1></header><div class="container"><div style="background:#e8f4f8;border-left:4px solid #004080;padding:.7rem 1rem;margin-bottom:1rem"><strong>Αντιπαράγωγος F(x):</strong> d/dx[F(x)+C] = f(x). Όλες τις αντιπαράγωγοι διαφέρουν κατά σταθερή C.</div><div class="control-group"><button class="btn" id="b1">f(x)=2x</button><button class="btn" id="b2">f(x)=cos(x)</button><button class="btn" id="b3">f(x)=1/x</button><label>C: <input type="range" id="c" min="-3" max="3" step="0.2" value="0"><span id="c-val">0</span></label></div><canvas id="canvas" width="700" height="450"></canvas></div><div class="author-stamp"><span class="stamp-book">📖 Συμπληρωματικό υλικό από το βιβλίο <em>«Μαθηματικά Ι»</em></span><span>Νίκος Ματζάκος, Αναπλ. Καθηγητής · ΑΣΠΑΙΤΕ</span></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');let func='2x',C=0;const funcs={
'2x':{f:x=>2*x,F:x=>x*x},
'cos':{ f:x=>Math.cos(x),F:x=>Math.sin(x)},
'inv':{f:x=>1/x,F:x=>Math.log(Math.abs(x))}};
document.getElementById('b1').addEventListener('click',()=>{func='2x';upd();});
document.getElementById('b2').addEventListener('click',()=>{func='cos';upd();});
document.getElementById('b3').addEventListener('click',()=>{func='inv';upd();});
document.getElementById('c').addEventListener('input',(e)=>{C=parseFloat(e.target.value);document.getElementById('c-val').textContent=C.toFixed(1);upd();});
function upd(){ctx.clearRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2;const cy=canvas.height/2;const sx=canvas.width*0.7/5;const sy=canvas.height*0.7/4;ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,canvas.height*0.1);ctx.lineTo(cx,canvas.height*0.9);ctx.stroke();ctx.beginPath();ctx.moveTo(canvas.width*0.15,cy);ctx.lineTo(canvas.width*0.85,cy);ctx.stroke();const f_obj=funcs[func];ctx.strokeStyle='#c85000';ctx.lineWidth=2.5;ctx.beginPath();for(let x=-3;x<=3;x+=0.05){const px=cx+x*sx;const py=cy-f_obj.f(x)*sy;if(x===-3)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();ctx.strokeStyle='#008c46';ctx.lineWidth=2.5;ctx.beginPath();for(let x=-2;x<=2;x+=0.05){const px=cx+x*sx;const py=cy-(f_obj.F(x)+C)*sy;if(x===-2)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();ctx.fillStyle='#333';ctx.font='bold 12px Georgia';ctx.fillText('f(x)',canvas.width*0.2,canvas.height*0.15);ctx.fillText('F(x)+C',canvas.width*0.2,canvas.height*0.25);}upd();</script></body></html>
